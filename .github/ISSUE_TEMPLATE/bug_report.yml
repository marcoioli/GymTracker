name: Bug report
description: Report a defect with enough detail to reproduce and fix it.
title: "fix: "
labels:
  - bug
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight
      options:
        - label: I searched for duplicates
          required: true
        - label: I understand this issue should exist before the implementation branch/PR
          required: true
  - type: textarea
    id: bug
    attributes:
      label: Bug description
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Use numbered steps when possible.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs / screenshots / extra evidence
    validations:
      required: false
