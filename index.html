<!doctype html>
<html lang="es-AR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FF8A34" />
    <link rel="icon" href="/icons/treino-app-icon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icons/treino-app-icon.png" />
    <title>Treino</title>
    <script>
      (() => {
        const theme =
          window.localStorage.getItem("gymtracker:theme") === "light"
            ? "light"
            : "dark";
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
        window.__treinoSplashStart = window.performance?.now?.() ?? Date.now();
      })();
    </script>
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        background-color: #FF8A34;
      }

      body {
        background: #FF8A34;
        color: #fff;
      }

      #app-launch-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        padding: 32px;
        background:
          radial-gradient(
            circle at 50% 30%,
            rgba(255, 255, 255, 0.12),
            transparent 55%
          ),
          #FF8A34;
        opacity: 1;
        visibility: visible;
        transition:
          opacity 320ms ease,
          visibility 320ms ease;
      }

      #app-launch-splash[data-state="hidden"] {
        opacity: 0;
        visibility: hidden;
      }

      .launch-splash__content {
        display: grid;
        justify-items: center;
        gap: 22px;
        text-align: center;
        animation: launch-splash-enter 560ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .launch-splash__brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .launch-splash__mark {
        width: 78px;
        height: 78px;
        object-fit: contain;
        filter: drop-shadow(0 6px 18px rgba(0, 0, 0, 0.18));
        animation: launch-splash-float 2.2s ease-in-out infinite;
      }

      .launch-splash__wordmark {
        font:
          700 2.6rem/1 "Barlow",
          sans-serif;
        letter-spacing: -0.05em;
        color: #fff;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.16);
      }

      .launch-splash__label {
        color: rgba(255, 255, 255, 0.82);
        font:
          500 0.96rem/1.45 "Barlow",
          sans-serif;
      }

      .launch-splash__progress {
        position: relative;
        width: min(100%, 200px);
        height: 3px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.22);
      }

      .launch-splash__progress::after {
        content: "";
        position: absolute;
        inset: 0;
        width: 48%;
        border-radius: inherit;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 0 16px rgba(255, 255, 255, 0.35);
        animation: launch-splash-loading 1.1s ease-in-out infinite;
      }

      @keyframes launch-splash-enter {
        0% {
          opacity: 0;
          transform: translateY(14px) scale(0.975);
        }

        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes launch-splash-loading {
        0% {
          transform: translateX(-140%);
        }

        100% {
          transform: translateX(300%);
        }
      }

      @keyframes launch-splash-float {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-5px);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #app-launch-splash,
        .launch-splash__content,
        .launch-splash__mark,
        .launch-splash__progress::after {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-launch-splash" aria-label="Treino está cargando" role="status">
      <div class="launch-splash__content">
        <div class="launch-splash__brand" aria-hidden="true">
          <img
            alt=""
            class="launch-splash__mark"
            src="/icons/logoTreinoPNG.png"
          />
          <div class="launch-splash__wordmark">Treino</div>
        </div>
        <div class="launch-splash__label">Preparando tu entrenamiento</div>
        <div aria-hidden="true" class="launch-splash__progress"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
