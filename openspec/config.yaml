schema: spec-driven

context: |
  Tech stack: React + TypeScript + Vite + PWA (planned baseline)
  Architecture: local-first, offline-first, single-user mobile web app
  Product focus: gym workout tracking with editable routines and historical analytics
  Testing: not installed yet; to be added during implementation foundation
  Style: mobile-first UI, high-contrast athletic visual system, accessible form inputs

